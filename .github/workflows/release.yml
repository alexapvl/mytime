name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build macOS slim packs (Homebrew; arm64 + x86_64)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/build-macos-pack.sh
          scripts/build-macos-pack.sh "$VERSION" arm64 slim
          scripts/build-macos-pack.sh "$VERSION" x86_64 slim
          ls -lh release/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/mytime-*-macos-*.tar.gz
