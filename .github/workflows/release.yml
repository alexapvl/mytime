name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build macOS packs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/build-macos-pack.sh
          scripts/build-macos-pack.sh "$VERSION" "${{ matrix.arch }}" slim
          scripts/build-macos-pack.sh "$VERSION" "${{ matrix.arch }}" standalone
          ls -lh release/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/mytime-*-macos-${{ matrix.arch }}*.tar.gz
